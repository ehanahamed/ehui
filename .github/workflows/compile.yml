name: Compile
on:
  workflow_dispatch:
    inputs:
      branch:
        default: 'main'
        required: true
        type: 'string'
jobs:
  build:
    name: Compile Sass
    runs-on: ubuntu-latest
    steps:
      - name: Clone from GitHub
        run: git clone --branch "${{ inputs.branch }}" --single-branch https://github.com/ehanahamed/ehui.git
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run npm script
        run: |
          cd ehui
          npm install
          npm run compile
      - name: Commit & push to GitHub
        run: |
          cd ehui
          git add .
          git config --global user.name "Ehan A"
          git config --global user.email "ehan@ehanaha.me"
          git commit -m "Compile Sass"
          git push https://ehanahamed:${{ secrets.GH_TOKEN }}@github.com/ehanahamed/ehui.git "${{ inputs.branch }}"
